<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acquire AIIbirds • The Domain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap');
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-gray-800 font-sans leading-relaxed">

    <nav class="bg-white border-b py-4 px-6">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-x-2">
                <div class="w-7 h-7 bg-[#00d4aa] text-white rounded-lg flex items-center justify-center text-xl rotate-12">🐦</div>
                <h1 class="logo-font text-xl tracking-tighter text-black">AIIbirds</h1>
            </a>
            <span class="text-xs font-mono text-gray-400">DOMAIN_ACQUISITION_PROTOCOL_V1.0</span>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 text-black uppercase tracking-tighter italic">Own the Hype.</h1>
            <p class="text-gray-500">AIIbirds.com is currently entertaining offers for full acquisition. High traffic, perfect parody, 100% neural potential.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
            <label class="block text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Enter Your Acquisition Offer</label>
            
            <div class="relative mb-6">
                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-3xl font-bold text-gray-300">$</span>
                <input type="number" id="offerAmount" value="1000" min="1000" 
                    class="w-full bg-gray-50 border-2 border-gray-100 focus:border-[#00d4aa] rounded-2xl py-6 pl-12 pr-6 text-3xl font-bold outline-none transition-all">
            </div>

            <p class="text-xs text-gray-400 mb-8 italic text-center">Minimum opening offer: $1,000 USD</p>

            <button onclick="sendAcquisitionEmail()" 
                class="w-full bg-black hover:bg-[#00d4aa] text-white hover:text-black py-6 rounded-2xl text-xl font-bold transition-all transform hover:scale-[1.02]">
                SUBMIT OFFER VIA EMAIL
            </button>
        </div>
        
        <div class="mt-12 text-center">
            <a href="index.html" class="text-gray-400 hover:text-black transition-colors text-sm">← Nevermind, I just want the sneakers</a>
        </div>
    </main>

    <script>
        function sendAcquisitionEmail() {
            const amount = document.getElementById('offerAmount').value;
            const email = "fronkware@gmail.com";
            const subject = encodeURIComponent(`Acquisition Offer: AIIbirds.com - $${amount}`);
            
            if (amount < 1000) {
                alert("The domain requires a minimum of $1,000 to process this request.");
                return;
            }

            const body = encodeURIComponent(
                `Hello,\n\nI am interested in acquiring the domain AIIbirds.com.\n\n` +
                `My initial offer is: $${amount} USD.\n\n` +
                `Please let me know the next steps for transfer.\n\n` +
                `Sent via the AIIbirds Acquisition Portal.`
            );

            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>

</body>
</html>
